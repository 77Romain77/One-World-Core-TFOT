name: Build OneWorldCore TFOT

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 1.20.1
  pull_request:
    branches:
      - main
      - 1.20.1

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Use GitHub Actions Java home
        shell: pwsh
        run: |
          (Get-Content gradle.properties) |
            Where-Object { $_ -notmatch '^org\.gradle\.java\.home=' } |
            Set-Content gradle.properties -Encoding ASCII
          "JAVA_HOME=$env:JAVA_HOME"

      - name: Increment OneWorldCore build version
        if: github.event_name != 'pull_request' && github.actor != 'github-actions[bot]'
        shell: pwsh
        run: |
          $propsPath = "core-version.properties"
          $raw = Get-Content $propsPath -Raw
          if ($raw -notmatch 'coreVersion=(\d+\.\d+\.\d+\.\d+)') {
            throw 'coreVersion was not found in core-version.properties'
          }

          $currentVersion = $Matches[1]
          $parts = $currentVersion.Split('.')
          $parts[$parts.Length - 1] = [string]([int]$parts[$parts.Length - 1] + 1)
          $newVersion = [string]::Join('.', $parts)
          $timestamp = (Get-Date).ToUniversalTime().ToString("ddd MMM dd HH:mm:ss 'UTC' yyyy", [System.Globalization.CultureInfo]::InvariantCulture)

          Set-Content $propsPath -Encoding ASCII -Value @(
            '#OneWorldCore build version state',
            "#$timestamp",
            "coreVersion=$newVersion"
          )

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $propsPath
          git commit -m "Bump OneWorldCore build version to $newVersion [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Apply Mythic damage diagnostics
        shell: pwsh
        run: |
          $path = "src/main/java/org/bukkit/craftbukkit/v1_20_R1/event/CraftEventFactory.java"
          $text = Get-Content $path -Raw

          if ($text -notmatch 'OWC/MythicDamageDebug') {
            $nl = [Environment]::NewLine
            $needle = [string]::Join($nl, @(
              '        event.setCancelled(cancelled);',
              '        callEvent(event);',
              '',
              '        if (!event.isCancelled()) {'
            ))
            $replacement = [string]::Join($nl, @(
              '        event.setCancelled(cancelled);',
              '        org.bukkit.entity.Entity debugDamager = event instanceof org.bukkit.event.entity.EntityDamageByEntityEvent debugByEntity ? debugByEntity.getDamager() : null;',
              '        Object debugShooter = debugDamager instanceof org.bukkit.entity.Projectile debugProjectile ? debugProjectile.getShooter() : null;',
              '        com.oneworldstudiomc.OneWorldCore.LOGGER.info("[OWC/MythicDamageDebug] BEFORE {} cause={} cancelled={} damage={} finalDamage={} damagee={} damager={} shooter={}", event.getClass().getSimpleName(), event.getCause(), event.isCancelled(), event.getDamage(), event.getFinalDamage(), event.getEntity(), debugDamager, debugShooter);',
              '        callEvent(event);',
              '        com.oneworldstudiomc.OneWorldCore.LOGGER.info("[OWC/MythicDamageDebug] AFTER {} cause={} cancelled={} damage={} finalDamage={} damagee={} damager={} shooter={}", event.getClass().getSimpleName(), event.getCause(), event.isCancelled(), event.getDamage(), event.getFinalDamage(), event.getEntity(), debugDamager, debugShooter);',
              '',
              '        if (!event.isCancelled()) {'
            ))
            $patched = $text.Replace($needle, $replacement)
            if ($patched -eq $text) {
              $needle = $needle.Replace($nl, "`n")
              $replacement = $replacement.Replace($nl, "`n")
              $patched = $text.Replace($needle, $replacement)
            }
            if ($patched -eq $text) {
              throw 'Unable to inject Mythic damage diagnostics into CraftEventFactory.'
            }
            Set-Content $path $patched -Encoding UTF8
          }

      - name: Build OneWorldCore jar
        id: build
        shell: pwsh
        run: |
          Get-Content core-version.properties
          .\gradlew.bat :oneworldstudio:oneworldcoreJar --stacktrace --no-daemon
          $jar = Get-ChildItem projects/oneworldstudio/build/libs/oneworldcore-*.jar | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $jar) {
            throw 'OneWorldCore jar was not produced'
          }
          $version = $jar.BaseName -replace '^oneworldcore-', ''
          "jar_version=$version" >> $env:GITHUB_OUTPUT

      - name: Upload OneWorldCore jar
        uses: actions/upload-artifact@v4
        with:
          name: OneWorldCore-1.20.1-${{ steps.build.outputs.jar_version }}
          path: projects/oneworldstudio/build/libs/oneworldcore-*.jar
          if-no-files-found: error

      - name: Upload Gradle diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: OneWorldCore-gradle-diagnostics-${{ github.run_number }}
          path: |
            **/build/reports/**
            **/build/**/*.log
            **/hs_err_pid*.log
          if-no-files-found: ignore
