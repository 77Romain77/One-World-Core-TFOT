# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Build OneWorldCore

on:
  push:
    branches: [ "main", "1.20.1" ]
  pull_request:
    branches: [ "main", "1.20.1" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Forge workspace
        run: |
          chmod +x ./gradlew
          ./gradlew setup packageLibraries --stacktrace

      - name: Set CI core version
        run: |
          printf '#OneWorldCore GitHub Actions build version\ncoreVersion=20.2.1.%s\n' "${GITHUB_RUN_NUMBER}" > core-version.properties
          cat core-version.properties

      - name: Build OneWorldCore jar
        run: |
          ./gradlew :oneworldstudio:oneworldcoreJar --stacktrace

      - name: Upload OneWorldCore jar
        uses: actions/upload-artifact@v4
        with:
          name: OneWorldCore-1.20.1-${{ github.run_number }}
          path: projects/oneworldstudio/build/libs/oneworldcore-*.jar
          if-no-files-found: error
