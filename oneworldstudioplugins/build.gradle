plugins {
    id 'java'
}

group = 'com.oneworldstudiomc'
version = ONEWORLDCORE_VERSION

repositories {
    mavenCentral()
}

dependencies {
    implementation(project(':oneworldstudio'))
}

tasks.named('processResources') {
    inputs.property('pluginVersion', project.version)
    filesMatching('plugin.yml') {
        expand(pluginVersion: project.version)
    }
}
